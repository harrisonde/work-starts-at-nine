version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
  exclusions:
    paths:
      - tmp
    rules:
      - path: handlers/handlers\.go
        linters: [revive]
      - path: middleware/(middleware|nosurf)\.go
        linters: [revive]
      - path: models/models\.go
        linters: [revive]
      - path: routes-api\.go
        linters: [revive]
        text: "var-naming"
      - path: routes-web\.go
        linters: [revive]
        text: "unused-parameter"
      - path: main\.go
        linters: [unused]
        text: "var wg is unused"

formatters:
  enable:
    - gofmt
